<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Inventering Långsjöryd älgskyddsområde</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >
  <style>
    :root {
      --bg-sand: #ede7dd;
      --bg-sage: #c8d8c3;
      --surface: rgba(249, 246, 240, 0.9);
      --ink: #203029;
      --muted: #4e6458;
      --accent: #b44f2e;
      --shadow: 0 14px 34px rgba(21, 38, 31, 0.16);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      font-family: "Manrope", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 85% 8%, rgba(180, 79, 46, 0.18), transparent 34%),
        radial-gradient(circle at 18% 88%, rgba(83, 122, 101, 0.18), transparent 30%),
        linear-gradient(160deg, var(--bg-sand) 0%, var(--bg-sage) 100%);
      min-height: 100%;
    }

    .page {
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 14px;
      min-height: 100%;
      padding: 14px;
      animation: fade-in 480ms ease-out;
    }

    .title-wrap {
      background: var(--surface);
      border: 1px solid rgba(32, 48, 41, 0.12);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px 14px;
      backdrop-filter: blur(2px);
    }

    h1 {
      margin: 0;
      font-family: "Fraunces", Georgia, serif;
      font-size: clamp(1.4rem, 5.6vw, 2.2rem);
      line-height: 1.15;
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .map-shell {
      background: var(--surface);
      border: 1px solid rgba(32, 48, 41, 0.12);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 10px;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: min(64vh, 560px);
      min-height: 340px;
      border-radius: 13px;
    }

    .legend {
      background: var(--surface);
      border: 1px solid rgba(32, 48, 41, 0.12);
      border-radius: var(--radius);
      padding: 12px 14px;
      box-shadow: var(--shadow);
    }

    .form-shell {
      background: var(--surface);
      border: 1px solid rgba(32, 48, 41, 0.12);
      border-radius: var(--radius);
      padding: 12px 14px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 10px;
    }

    .form-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
    }

    .field-wrap {
      display: grid;
      gap: 6px;
    }

    .field-wrap label {
      font-size: 0.88rem;
      color: var(--muted);
      font-weight: 600;
    }

    .field-wrap input,
    .field-wrap textarea {
      width: 100%;
      border: 1px solid rgba(32, 48, 41, 0.2);
      border-radius: 10px;
      padding: 10px;
      font: inherit;
      color: var(--ink);
      background: #ffffff;
    }

    .field-wrap textarea {
      min-height: 88px;
      resize: vertical;
    }

    .coord-note {
      margin: 0;
      font-size: 0.86rem;
      color: var(--muted);
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .button-row + .button-row {
      margin-top: 6px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 11px 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--ink);
      color: #f3f2ef;
    }

    .btn-secondary {
      background: #e7eee5;
      color: var(--ink);
      border: 1px solid rgba(32, 48, 41, 0.2);
    }

    .legend-title {
      margin: 0 0 8px;
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--ink);
    }

    .legend ul {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      font-size: 0.9rem;
      display: grid;
      gap: 6px;
    }

    .leaflet-popup-content {
      margin: 10px 12px;
      min-width: 180px;
      font-size: 0.92rem;
      line-height: 1.35;
    }

    .popup-title {
      margin: 0 0 6px;
      font-size: 0.98rem;
      color: var(--ink);
      font-weight: 700;
    }

    .popup-row {
      margin: 0;
      color: var(--muted);
    }

    .popup-row strong {
      color: var(--ink);
    }

    .leaflet-control-attribution {
      font-size: 11px;
    }

    @media (min-width: 760px) {
      .page {
        grid-template-columns: minmax(0, 1fr);
        padding: 24px;
        gap: 18px;
      }

      #map {
        height: min(68vh, 640px);
      }

      .title-wrap,
      .map-shell,
      .form-shell,
      .legend {
        max-width: 960px;
        width: 100%;
        margin-inline: auto;
      }

      .button-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @keyframes fade-in {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="title-wrap">
      <h1>Långsjöryd älgskyddsområde sommar 2026</h1>
      <p class="subtitle">Tryck på en markör för att se detaljerad information från registrerad observation.</p>
    </section>

    <section class="map-shell">
      <div id="map" aria-label="Karta &ouml;ver &auml;lgobservationer"></div>
    </section>

    <!--
    <section class="form-shell">
      <h2 class="form-title">L&auml;gg till observation</h2>
      <form id="observationForm">
        <div class="field-wrap">
          <label for="obsTime">Tid</label>
          <input id="obsTime" name="time" type="datetime-local" required>
        </div>
        <div class="field-wrap">
          <label for="obsDescription">Beskrivning</label>
          <textarea id="obsDescription" name="description" required placeholder="Beskriv vad som observerades"></textarea>
        </div>
        <p id="coordStatus" class="coord-note">Tryck p&aring; kartan f&ouml;r att v&auml;lja position.</p>
        <p id="addressStatus" class="coord-note">Adress skapas automatiskt fr&aring;n vald position.</p>
        <div class="button-row">
          <button class="btn-primary" type="submit">Spara observation</button>
        </div>
        <div class="button-row">
          <button class="btn-secondary" type="button" id="shareObservations">Kopiera delningsl&auml;nk</button>
        </div>
        <p id="shareStatus" class="coord-note">Delning fungerar utan databas via l&auml;nk.</p>
      </form>
    </section>
    -->

    <section class="legend">
      <p class="legend-title">Registrerade observationer</p>
      <ul id="pinList"></ul>
    </section>
  </main>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script>
    const STORAGE_KEY = "mooseObservationsV1";
    const defaultPins = [
      {
        address: "Gökadalsvägen, Ronneby kommun",
        time: "2026-07-18 09:43",
        description: "Ensam kviga höger sida av vägen.",
        coords: [56.411119, 15.183847]
      },
      {
        address: "Östra Hult, Ronneby kommun",
        time: "2026-07-18 10:06",
        description: "Ensam kviga i skogskanten. Kom cyklandes norrifrån och den gick österut.",
        coords: [56.389426, 15.25296]
      },
      {
        address: "Hallabro nära Hallagölen, Ronneby kommun",
        time: "2026-07-19 20:23",
        description: "Pytteliten fjolårskalv nere på hygget höger sida av vägen. Valpiga öron förvånande blick.",
        coords: [56.394475, 15.113145]
      },
    {
        address: "Hobyvägen, 372 77 Backaryd, Sweden",
        time: "2026-07-23 09:21",
        description: "Ensam älg korsar vägen i östgående riktning. Förvann snabbt in i skogen.",
        coords: [56.313896, 15.129967]
      }
    ];

    function loadCustomPins() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          return [];
        }
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) {
          return [];
        }
        return parsed.filter((pin) => (
          pin &&
          typeof pin.address === "string" &&
          typeof pin.time === "string" &&
          typeof pin.description === "string" &&
          Array.isArray(pin.coords) &&
          pin.coords.length === 2 &&
          Number.isFinite(pin.coords[0]) &&
          Number.isFinite(pin.coords[1])
        ));
      } catch (error) {
        return [];
      }
    }

    function saveCustomPins(pins) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(pins));
    }

    function normalizeSharedPins(pins) {
      if (!Array.isArray(pins)) {
        return [];
      }

      return pins.filter((pin) => (
        pin &&
        typeof pin.address === "string" &&
        typeof pin.time === "string" &&
        typeof pin.description === "string" &&
        Array.isArray(pin.coords) &&
        pin.coords.length === 2 &&
        Number.isFinite(pin.coords[0]) &&
        Number.isFinite(pin.coords[1])
      ));
    }

    function parseSharedPinsFromHash() {
      try {
        const hash = window.location.hash;
        if (!hash.startsWith("#obs=")) {
          return [];
        }

        const encoded = hash.slice(5);
        if (!encoded) {
          return [];
        }

        const json = decodeURIComponent(escape(atob(encoded)));
        const parsed = JSON.parse(json);
        return normalizeSharedPins(parsed);
      } catch (error) {
        return [];
      }
    }

    function createShareLink(pins) {
      const sharedPins = normalizeSharedPins(pins);
      const json = JSON.stringify(sharedPins);
      const encoded = btoa(unescape(encodeURIComponent(json)));
      return `${window.location.origin}${window.location.pathname}#obs=${encoded}`;
    }

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    let customPins = [];
    let moosePins = [...defaultPins];
    let markerGroup = null;
    let selectedCoords = null;
    let selectedAddress = "";
    let draftMarker = null;

    const map = L.map("map", {
      zoomControl: true,
      preferCanvas: true
    });

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap"
    }).addTo(map);

    const mooseIcon = L.icon({
      iconUrl: "https://cdn11.bigcommerce.com/s-hii7479o/images/stencil/original/products/9508/25633/Moose__01253.1523570178.png?c=2",
      iconSize: [42, 42],
      iconAnchor: [21, 33],
      popupAnchor: [0, -30]
    });

    const houseIcon = L.icon({
      iconUrl: "https://static.vecteezy.com/system/resources/thumbnails/011/886/113/small/house-village-city-atl-png.png",
      iconSize: [34, 34],
      iconAnchor: [17, 30],
      popupAnchor: [0, -26]
    });
    const houseCoords = [56.383259, 15.159735];

    const observationForm = document.getElementById("observationForm");
    const observationTimeInput = document.getElementById("obsTime");
    const coordStatus = document.getElementById("coordStatus");
    const addressStatus = document.getElementById("addressStatus");
    const shareButton = document.getElementById("shareObservations");
    const shareStatus = document.getElementById("shareStatus");
    const pinList = document.getElementById("pinList");

    function setDefaultObservationTime() {
      if (!observationTimeInput) {
        return;
      }
      const now = new Date();
      const timezoneOffsetMs = now.getTimezoneOffset() * 60000;
      const localIso = new Date(now.getTime() - timezoneOffsetMs).toISOString().slice(0, 16);
      observationTimeInput.value = localIso;
    }

    async function reverseGeocode(lat, lng) {
      const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`;

      try {
        const response = await fetch(url, {
          headers: {
            "Accept": "application/json"
          }
        });

        if (!response.ok) {
          throw new Error("Reverse geocode failed");
        }

        const data = await response.json();
        return data.display_name || "";
      } catch (error) {
        return "";
      }
    }

    function renderObservations() {
      if (markerGroup) {
        markerGroup.remove();
      }
      markerGroup = L.featureGroup().addTo(map);
      pinList.innerHTML = "";

      const bounds = L.latLngBounds();

      moosePins.forEach((pin) => {
        const marker = L.marker(pin.coords, {
          icon: mooseIcon
        }).addTo(markerGroup);

        const popupHtml = `
          <h2 class="popup-title">Observation</h2>
          <p class="popup-row"><strong>Adress:</strong> ${escapeHtml(pin.address)}</p>
          <p class="popup-row"><strong>Tid:</strong> ${escapeHtml(pin.time)}</p>
          <p class="popup-row"><strong>Beskrivning:</strong> ${escapeHtml(pin.description)}</p>
        `;

        marker.bindPopup(popupHtml, {
          autoPanPaddingTopLeft: [24, 24],
          autoPanPaddingBottomRight: [24, 24]
        });

        const item = document.createElement("li");
        item.textContent = `${pin.address} (${pin.time})`;
        pinList.appendChild(item);

        bounds.extend(pin.coords);
      });

      const houseMarker = L.marker(houseCoords, {
        icon: houseIcon
      }).addTo(markerGroup);
      houseMarker.bindPopup(`
        <h2 class="popup-title">Hus</h2>
        <p class="popup-row"><strong>Position:</strong> 56.383259, 15.159735</p>
      `);
      bounds.extend(houseCoords);

      if (moosePins.length > 0) {
        map.fitBounds(bounds.pad(0.2), {
          maxZoom: 14,
          animate: true
        });
      } else {
        map.setView([56.2, 15.27], 11);
      }
    }

    map.on("click", async (event) => {
      if (!observationForm) {
        return;
      }

      selectedCoords = [
        Number(event.latlng.lat.toFixed(6)),
        Number(event.latlng.lng.toFixed(6))
      ];

      if (draftMarker) {
        draftMarker.setLatLng(selectedCoords);
      } else {
        draftMarker = L.circleMarker(selectedCoords, {
          radius: 8,
          color: "#b44f2e",
          fillColor: "#b44f2e",
          fillOpacity: 0.25,
          weight: 2
        }).addTo(map);
      }

      if (coordStatus) {
        coordStatus.textContent = `Vald position: ${selectedCoords[0]}, ${selectedCoords[1]}`;
      }
      if (addressStatus) {
        addressStatus.textContent = "H\u00e4mtar adress fr\u00e5n koordinater...";
      }

      const fetchedAddress = await reverseGeocode(selectedCoords[0], selectedCoords[1]);
      selectedAddress = fetchedAddress || `Koordinater: ${selectedCoords[0]}, ${selectedCoords[1]}`;
      if (addressStatus) {
        addressStatus.textContent = `Adress: ${selectedAddress}`;
      }
    });

    if (observationForm) {
      observationForm.addEventListener("submit", (event) => {
        event.preventDefault();

        if (!selectedCoords) {
          if (coordStatus) {
            coordStatus.textContent = "V\u00e4lj en position p\u00e5 kartan innan du sparar.";
          }
          return;
        }

        const formData = new FormData(observationForm);
        const newPin = {
          address: selectedAddress || `Koordinater: ${selectedCoords[0]}, ${selectedCoords[1]}`,
          time: String(formData.get("time") || "").trim().replace("T", " "),
          description: String(formData.get("description") || "").trim(),
          coords: selectedCoords
        };

        if (!newPin.time || !newPin.description) {
          return;
        }

        customPins.push(newPin);
        saveCustomPins(customPins);
        moosePins = [...defaultPins, ...customPins];
        renderObservations();

        observationForm.reset();
        setDefaultObservationTime();
        selectedCoords = null;
        selectedAddress = "";
        if (coordStatus) {
          coordStatus.textContent = "Observation sparad. Tryck p\u00e5 kartan f\u00f6r en ny position.";
        }
        if (addressStatus) {
          addressStatus.textContent = "Adress skapas automatiskt fr\u00e5n vald position.";
        }

        if (draftMarker) {
          draftMarker.remove();
          draftMarker = null;
        }
      });
    }

    const sharedPinsFromLink = parseSharedPinsFromHash();
    if (sharedPinsFromLink.length > 0) {
      customPins = sharedPinsFromLink;
      saveCustomPins(customPins);
      if (shareStatus) {
        shareStatus.textContent = "Observationer laddade fr&aring;n delningsl&auml;nk.";
      }
    }

    if (shareButton) {
      shareButton.addEventListener("click", async () => {
        const shareLink = createShareLink(customPins);

        try {
          await navigator.clipboard.writeText(shareLink);
          if (shareStatus) {
            shareStatus.textContent = "Delningsl&auml;nk kopierad. Skicka den till din v&auml;n.";
          }
        } catch (error) {
          if (shareStatus) {
            shareStatus.textContent = `Kunde inte kopiera automatiskt. Anv&auml;nd denna l&auml;nk: ${shareLink}`;
          }
        }
      });
    }

    setDefaultObservationTime();
    renderObservations();
  </script>
</body>
</html>
